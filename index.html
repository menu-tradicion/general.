{item.isCasa && <span className="badge-casa">🏠 {t.house}</span>}
{item.isSandwich && <span className="badge-sandwich">🥪 {t.sandwich}</span>}
<p className="text-xs sm:text-sm italic opacity-70 font-light leading-relaxed mb-2">{getDescription()}</p>
<button
onClick={handleAdd}
className="btn-add-subtle uppercase-elegant !text-[7px] sm:!text-[8px] font-bold"
>
{added ? `✓ ${t.added}` : t.addToCart}
</button>
</div>
</div>
);
};
const Footer = ({ t }) => (
<footer className="bg-[#1b261b] text-[#f4f1ea] py-12 px-6 mt-20 border-t-2 border-brava/20">
<div className="max-w-4xl mx-auto">
<div className="flex flex-col items-center justify-center space-y-4">
<SimpleToucanLogo />
<h3 className="text-2xl italic font-light tracking-tight">{t.brand}</h3>
<div className="flex items-center gap-6">
<a
href="https://wa.me/573205712682"
target="_blank"
rel="noopener noreferrer"
className="social-icon text-[#f4f1ea] hover:text-brava transition-colors flex flex-col items-center gap-1"
>
<div className="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center">
<WhatsAppIcon className="w-5 h-5" />
</div>
<span className="uppercase-elegant !text-[7px] opacity-60">WhatsApp</span>
</a>
<a
href="https://instagram.com/braza_brava00"
target="_blank"
rel="noopener noreferrer"
className="social-icon text-[#f4f1ea] hover:text-brava transition-colors flex flex-col items-center gap-1"
>
<div className="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center">
<InstagramIcon className="w-5 h-5" />
</div>
<span className="uppercase-elegant !text-[7px] opacity-60">Instagram</span>
</a>
</div>
<div className="w-20 h-px bg-brava/30 my-3"></div>
<div className="text-center space-y-2">
<p className="uppercase-elegant opacity-50 !text-[8px]">© 2025 {t.brand}</p>
<p className="text-base italic opacity-40">Todos los derechos reservados</p>
<p className="uppercase-elegant opacity-30 !text-[7px] tracking-wider">{t.address}</p>
</div>
<LeafSVG className="w-10 h-10 opacity-15 mt-4" />
</div>
</div>
</footer>
);
const LanguageSelector = ({ currentLang, setLang }) => {
const languages = [
{ code: 'es', label: 'ES' },
{ code: 'en', label: 'EN' },
{ code: 'fr', label: 'FR' }
];
return (
<div className="lang-selector">
{languages.map(lang => (
<button
key={lang.code}
onClick={() => setLang(lang.code)}
className={`lang-btn ${currentLang === lang.code ? 'active' : ''}`}
title={lang.code === 'es' ? 'Español' : lang.code === 'en' ? 'English' : 'Français'}
>
{lang.label}
</button>
))}
</div>
);
};
function App() {
const [scene, setScene] = useState('landing');
const [activeSub, setActiveSub] = useState("Salchis");
const [cart, setCart] = useState([]);
const [showCart, setShowCart] = useState(false);
const [checkoutStep, setCheckoutStep] = useState(1);
const [deliveryType, setDeliveryType] = useState('pickup');
const [address, setAddress] = useState('');
const [comments, setComments] = useState('');
const [paymentMethod, setPaymentMethod] = useState('');
const [customerName, setCustomerName] = useState('');
const [customerPhone, setCustomerPhone] = useState('');
const [language, setLanguage] = useState('es');
const DELIVERY_FEE = 1500;
const t = TRANSLATIONS[language];
const categoryT = CATEGORY_TRANSLATIONS[language];
const addToCart = (item) => {
setCart(prev => {
const exist = prev.find(i => i.id === item.id && i.name === item.name);
if (exist) return prev.map(i => i.id === item.id && i.name === item.name ? {...i, qty: i.qty + 1} : i);
return [...prev, {...item, qty: 1}];
});
};
const subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
const deliveryCost = deliveryType === 'delivery' ? DELIVERY_FEE : 0;
const total = subtotal + deliveryCost;
const handleOrder = () => {
let text = `*🍴 ORDEN ${t.brand.toUpperCase()}*
`;
text += `*${t.fullName}:* ${customerName}
`;
text += `*${t.phone}:* ${customerPhone}
`;
text += `*${t.deliveryType}:* ${deliveryType === 'pickup' ? `🏪 ${t.pickup}` : `🚚 ${t.delivery}`}
`;
if (deliveryType === 'delivery') {
text += `*${t.addressLabel}:* ${address}
`;
}
text += `*${t.paymentMethod}:* ${paymentMethod === 'transfer' ? `🏦 ${t.bankTransfer}` : `💳 ${t.card}`}
`;
text += `*📋 PEDIDO:*
`;
cart.forEach(i => text += `• ${i.qty}x ${i.name} — $${(i.price * i.qty).toLocaleString()}
`);
text += `
*${t.subtotal}:* $${subtotal.toLocaleString()}`;
if (deliveryType === 'delivery') {
text += `
*${t.deliveryCost}:* $${DELIVERY_FEE.toLocaleString()}`;
}
text += `
*${t.total}: $${total.toLocaleString()}*`;
if (comments) {
text += `
*📝 ${t.comments}:* ${comments}`;
}
window.open(`https://wa.me/573205712682?text=${encodeURIComponent(text)}`);
};
const resetCheckout = () => {
setCheckoutStep(1);
setDeliveryType('pickup');
setAddress('');
setComments('');
setPaymentMethod('');
setCustomerName('');
setCustomerPhone('');
};
if (scene === 'landing') {
return (
<div className="min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden bg-[#f4f1ea]">
<LanguageSelector currentLang={language} setLang={setLanguage} />
<LeafSVG className="leaf-decoration -top-10 -left-10 w-60 h-60 rotate-45" />
<LeafSVG className="leaf-decoration -bottom-10 -right-10 w-72 h-72 -rotate-12" />
<div className="relative z-10 text-center reveal w-full flex flex-col items-center max-w-sm">
<ToucanLogo />
<h1 className="text-5xl sm:text-6xl italic font-light mb-1 tracking-tighter text-[#1b261b]">{t.brand}</h1>
<p className="uppercase-elegant text-brava mb-10 italic font-bold">{t.tagline}</p>
<div className="flex flex-col gap-4 w-full max-w-[280px] mb-12">
<button onClick={() => {setScene('tarde'); setActiveSub("Café de Especialidad");}} className="bg-white py-5 px-5 rounded-md shadow-sm transition-all hover:shadow-xl border border-[#1b261b]/5 flex flex-col items-center group">
<span className="text-xl italic font-semibold text-[#1b261b] group-hover:text-brava transition-colors">{t.afternoon}</span>
<span className="uppercase-elegant text-[8px] opacity-50 mt-1 block">{t.afternoonSub}</span>
</button>
<button onClick={() => {setScene('parrilla'); setActiveSub("Salchis");}} className="bg-[#1b261b] text-white py-5 px-5 rounded-md shadow-2xl transition-all flex flex-col items-center hover:bg-[#253525]">
<span className="text-xl italic font-semibold">{t.grill}</span>
<span className="uppercase-elegant text-[8px] text-brava mt-1 block font-bold">{t.grillSub}</span>
</button>
</div>
<div className="flex flex-col items-center gap-1 opacity-60">
<p className="uppercase-elegant !text-[8px] font-bold">{t.address}</p>
</div>
</div>
</div>
);
}
const currentItems = scene === 'tarde' ? MENU_DATA.tarde[activeSub] : MENU_DATA.parrilla[activeSub];
const isTarde = scene === 'tarde';
const isParrilla = scene === 'parrilla';
const isSalchis = activeSub === "Salchis";
const isBeverage = ["Jugos Naturales", "Gaseosas", "Cocteles Especiales"].includes(activeSub);
const isTardeCategory = ["Café de Especialidad", "Panadería", "Waffles Artesanales", "Bebidas Frappé"].includes(activeSub);
const getSalchisBySize = () => {
const sizes = [
{ key: "Personal", title: t.personal, subtitle: t.forOne },
{ key: "Para Dos", title: t.forTwo, subtitle: t.toShare },
{ key: "Familiar", title: t.family, subtitle: t.forAll }
];
const result = [];
sizes.forEach(sizeInfo => {
const itemsOfSize = currentItems.filter(item => item.size === sizeInfo.key);
if (itemsOfSize.length > 0) {
result.push({
type: 'section',
title: sizeInfo.title,
subtitle: sizeInfo.subtitle,
items: itemsOfSize
});
}
});
return result;
};
const salchisSections = isSalchis ? getSalchisBySize() : [];
return (
<div className="min-h-screen relative">
<LeafSVG className="leaf-decoration top-40 -left-20 w-48 h-48 opacity-[0.05]" />
<header className="fixed top-0 inset-x-0 z-50 glass px-4 py-4 flex justify-between items-center">
<button onClick={() => setScene('landing')} className="uppercase-elegant !text-[9px] font-bold opacity-80 hover:text-brava">← {t.home}</button>
<h2 className="text-2xl italic font-medium tracking-tight">{t.brand}</h2>
<button onClick={() => {setShowCart(true); resetCheckout();}} className="relative p-2 text-xl">
<span className="grayscale-[0.5]">🌿</span>
{cart.length > 0 && (
<span className="absolute -top-1 -right-0 bg-brava text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold shadow-sm">
{cart.reduce((a,b)=>a+b.qty,0)}
</span>
)}
</button>
</header>
<main className="pt-28 px-4 max-w-4xl mx-auto relative z-10 pb-40">
<div className="text-center mb-10 reveal">
<h3 className="text-4xl italic font-light">{isTarde ? t.afternoon : t.grill}</h3>
<div className="h-1 w-10 bg-brava mx-auto mt-3 rounded-full opacity-60"></div>
</div>
{(isParrilla || isTarde) && (
<div className="flex overflow-x-auto gap-3 pb-5 mb-6 no-scrollbar justify-start sm:justify-center">
{Object.keys(isTarde ? MENU_DATA.tarde : MENU_DATA.parrilla).map(cat => (
<button
key={cat}
onClick={() => setActiveSub(cat)}
className={`whitespace-nowrap uppercase-elegant category-tab ${activeSub === cat ? 'active' : 'opacity-60 bg-white/50'}`}
>
{categoryT[cat] || cat}
</button>
))}
</div>
)}
{!isSalchis && !isBeverage && !isTardeCategory && activeSub !== "Sandwiches" && (
<div className="relative">
<div
className={`flex overflow-x-auto gap-4 pb-6 no-scrollbar ${isParrilla ? 'horizontal-scroll' : ''}`}
style={{ scrollBehavior: 'smooth' }}
>
{currentItems.map((item, idx) => (
<ItemCard
key={item.id}
item={item}
onAdd={addToCart}
delay={`${idx * 0.1}s`}
isHorizontal={isParrilla}
t={t}
lang={language}
/>
))}
</div>
{isParrilla && currentItems.length > 1 && (
<div className="flex justify-center items-center gap-2 mt-2 text-xs opacity-40 italic scroll-hint">
<span>← {t.slideHint} →</span>
</div>
)}
</div>
)}
{(isSalchis || isTardeCategory || activeSub === "Sandwiches") && (
<div className="space-y-4">
{isSalchis ? (
salchisSections.map((section, sectionIdx) => (
<div key={sectionIdx}>
<VerticalSectionHeader title={section.title} subtitle={section.subtitle} />
<div className="space-y-2">
{section.items.map((item, itemIdx) => (
<ItemCard
key={item.id}
item={item}
onAdd={addToCart}
delay={`${(sectionIdx * 10 + itemIdx) * 0.1}s`}
isHorizontal={false}
isVertical={true}
t={t}
lang={language}
/>
))}
</div>
</div>
))
) : (
currentItems.map((item, idx) => (
<ItemCard
key={item.id}
item={item}
onAdd={addToCart}
delay={`${idx * 0.1}s`}
isHorizontal={false}
isVertical={true}
t={t}
lang={language}
/>
))
)}
</div>
)}
{isBeverage && (
<div className="space-y-4">
{currentItems.map((item, idx) => (
<ItemCard
key={item.id}
item={item}
onAdd={addToCart}
delay={`${idx * 0.1}s`}
isHorizontal={false}
isVertical={true}
t={t}
lang={language}
/>
))}
</div>
)}
{(isParrilla || isTarde) && currentItems.length > 1 && !isSalchis && !isBeverage && !isTardeCategory && activeSub !== "Sandwiches" && (
<div className="flex justify-center gap-2 mt-4">
{currentItems.map((_, idx) => (
<div
key={idx}
className={`w-2 h-2 rounded-full transition-all ${idx === 0 ? 'bg-brava w-5' : 'bg-black/20'}`}
/>
))}
</div>
)}
</main>
<Footer t={t} />
{showCart && (
<div className="fixed inset-0 z-[100] flex justify-end">
<div className="absolute inset-0 bg-black/50 backdrop-blur-sm" onClick={() => setShowCart(false)}></div>
<div className="relative bg-[#f4f1ea] w-full max-w-md h-full shadow-2xl p-6 flex flex-col animate-in slide-in-from-right duration-500">
<div className="flex justify-between items-center mb-6 border-b border-black/5 pb-4">
<h3 className="text-3xl italic">{t.yourOrder}</h3>
<button onClick={() => setShowCart(false)} className="text-3xl font-light opacity-40 hover:text-brava transition-colors">&times;</button>
</div>
<div className="flex gap-2 mb-6">
{[1, 2, 3].map(step => (
<div
key={step}
className={`flex-1 h-2 rounded-full transition-all ${step <= checkoutStep ? 'bg-brava' : 'bg-black/20'}`}
/>
))}
</div>
{checkoutStep === 1 && (
<div className="flex-1 overflow-y-auto no-scrollbar">
{cart.length === 0 ? (
<div className="text-center py-20 opacity-30 uppercase-elegant !text-[11px] italic tracking-widest">{t.emptyCart}</div>
) : (
<div className="space-y-4">
{cart.map(item => (
<div key={item.id + item.name} className="border-b border-black/5 pb-4 flex justify-between items-start group">
<div className="flex-1">
<span className="text-xl italic block font-medium group-hover:text-brava transition-colors">{item.name}</span>
<span className="uppercase-elegant !text-[8px] opacity-50 block mt-1 font-bold">{item.qty} {t.unit}</span>
</div>
<div className="text-right ml-4">
<span className="block text-lg font-bold text-brava">${(item.price * item.qty).toLocaleString()}</span>
<button onClick={() => setCart(c => c.filter(x => x.id !== item.id || x.name !== item.name))} className="text-red-700 text-[9px] mt-1 font-bold uppercase-elegant opacity-60 hover:opacity-100 tracking-tighter">{t.remove}</button>
</div>
</div>
))}
</div>
)}
</div>
)}
{checkoutStep === 2 && (
<div className="flex-1 overflow-y-auto no-scrollbar space-y-4">
<div>
<label className="block text-sm italic opacity-70 mb-2">{t.fullName}</label>
<input
type="text"
className="form-input"
placeholder={t.fullName}
value={customerName}
onChange={(e) => setCustomerName(e.target.value)}
/>
</div>
<div>
<label className="block text-sm italic opacity-70 mb-2">{t.phone}</label>
<input
type="tel"
className="form-input"
placeholder={t.phone}
value={customerPhone}
onChange={(e) => setCustomerPhone(e.target.value)}
/>
</div>
<div>
<label className="block text-sm italic opacity-70 mb-3">{t.deliveryType}</label>
<div
className={`delivery-option ${deliveryType === 'pickup' ? 'selected' : ''}`}
onClick={() => setDeliveryType('pickup')}
>
<div className="delivery-radio"></div>
<div>
<p className="font-bold italic">🏪 {t.pickup}</p>
<p className="text-xs opacity-60">{t.address}</p>
</div>
</div>
<div
className={`delivery-option ${deliveryType === 'delivery' ? 'selected' : ''}`}
onClick={() => setDeliveryType('delivery')}
>
<div className="delivery-radio"></div>
<div className="flex-1">
<p className="font-bold italic">🚚 {t.delivery}</p>
<p className="text-xs opacity-60">{t.deliveryCost}: $1.500</p>
</div>
</div>
</div>
{deliveryType === 'delivery' && (
<div>
<label className="block text-sm italic opacity-70 mb-2">{t.addressLabel}</label>
<textarea
className="form-textarea"
placeholder={t.addressLabel}
value={address}
onChange={(e) => setAddress(e.target.value)}
/>
</div>
)}
<div>
<label className="block text-sm italic opacity-70 mb-2">{t.comments}</label>
<textarea
className="form-textarea"
placeholder={t.comments}
value={comments}
onChange={(e) => setComments(e.target.value)}
/>
</div>
</div>
)}
{checkoutStep === 3 && (
<div className="flex-1 overflow-y-auto no-scrollbar space-y-4">
<div>
<label className="block text-sm italic opacity-70 mb-3">{t.paymentMethod}</label>
<div
className={`payment-option ${paymentMethod === 'transfer' ? 'selected' : ''}`}
onClick={() => setPaymentMethod('transfer')}
>
<div className="delivery-radio"></div>
<div>
<p className="font-bold italic">🏦 {t.bankTransfer}</p>
<p className="text-xs opacity-60">{t.bankNote}</p>
</div>
</div>
<div
className={`payment-option ${paymentMethod === 'card' ? 'selected' : ''}`}
onClick={() => setPaymentMethod('card')}
>
<div className="delivery-radio"></div>
<div>
<p className="font-bold italic">💳 {t.card}</p>
<p className="text-xs opacity-60">{t.cardNote}</p>
</div>
</div>
</div>
<div className="border-t-2 border-brava/20 pt-6 space-y-3">
<div className="flex justify-between">
<span className="uppercase-elegant opacity-60">{t.subtotal}</span>
<span className="font-bold">${subtotal.toLocaleString()}</span>
</div>
{deliveryType === 'delivery' && (
<div className="flex justify-between">
<span className="uppercase-elegant opacity-60">{t.deliveryCost}</span>
<span className="font-bold text-brava">$${DELIVERY_FEE.toLocaleString()}</span>
</div>
)}
<div className="flex justify-between text-2xl font-light tracking-tighter text-brava pt-3 border-t border-black/10">
<span className="uppercase-elegant opacity-60 font-bold">{t.total}</span>
<span>${total.toLocaleString()}</span>
</div>
</div>
</div>
)}
<div className="pt-6 space-y-4 border-t border-black/10">
{checkoutStep === 1 && (
<button
onClick={() => setCheckoutStep(2)}
disabled={cart.length === 0}
className="w-full bg-brava text-white py-5 rounded-sm uppercase-elegant !text-[11px] font-bold shadow-xl active:scale-95 transition-all disabled:opacity-20 hover:brightness-110"
>
{t.continue}
</button>
)}
{checkoutStep === 2 && (
<>
<button
onClick={() => setCheckoutStep(1)}
className="w-full bg-white text-[#1b261b] py-5 rounded-sm uppercase-elegant !text-[11px] font-bold border-2 border-[#1b261b]/20 active:scale-95 transition-all"
>
← {t.back}
</button>
<button
onClick={() => setCheckoutStep(3)}
disabled={!customerName || !customerPhone || (deliveryType === 'delivery' && !address)}
className="w-full bg-brava text-white py-5 rounded-sm uppercase-elegant !text-[11px] font-bold shadow-xl active:scale-95 transition-all disabled:opacity-20 hover:brightness-110"
>
{t.continue}
</button>
</>
)}
{checkoutStep === 3 && (
<>
<button
onClick={() => setCheckoutStep(2)}
className="w-full bg-white text-[#1b261b] py-5 rounded-sm uppercase-elegant !text-[11px] font-bold border-2 border-[#1b261b]/20 active:scale-95 transition-all"
>
← {t.back}
</button>
<button
onClick={handleOrder}
disabled={!paymentMethod}
className="w-full bg-[#25D366] text-white py-5 rounded-sm uppercase-elegant !text-[11px] font-bold shadow-xl active:scale-95 transition-all disabled:opacity-20 hover:brightness-110 flex items-center justify-center gap-2"
>
<WhatsAppIcon className="w-5 h-5" />
{t.sendOrder}
</button>
</>
)}
</div>
</div>
</div>
)}
</div>
);
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
